name: Build iOS

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Tạo release với tag này (vd: v16.5.0-custom), bỏ trống để skip'
        required: false
        default: ''

env:
  FRIDA_COMPILER_MOD: subprojects/frida-core/src/compiler/go.mod

jobs:
  build:
    strategy:
      matrix:
        arch: [arm64, arm64e]
      fail-fast: false
    runs-on: macos-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Init releng
        run: |
          git submodule update --init --depth 1 releng
          cd releng && git submodule update --init --depth 1

      - name: Grab frida-core
        run: python3 tools/ensure-submodules.py frida-core

      - name: Install Go toolchain
        uses: actions/setup-go@v5
        with:
          go-version-file: ${{ env.FRIDA_COMPILER_MOD }}
          cache-dependency-path: ${{ env.FRIDA_COMPILER_MOD }}

      - name: Install Python dependencies
        run: pip install setuptools

      - name: Set up environment
        run: |
          echo "FRIDA_PREFIX=$RUNNER_WORKSPACE/dist" >> $GITHUB_ENV
          echo "FRIDA_VERSION=$(python3 releng/frida_version.py)" >> $GITHUB_ENV
          echo "IOS_CERTID=-" >> $GITHUB_ENV

      - name: Configure
        run: >-
          ./configure
          --prefix=/usr
          --host=ios-${{ matrix.arch }}
          --enable-server
          --enable-gadget
          --enable-inject
          --enable-portal
          --
          -Dfrida-gum:devkits=gum,gumjs
          -Dfrida-core:compiler_backend=${{ matrix.arch != 'arm64e' && 'enabled' || 'disabled' }}
          -Dfrida-core:assets=installed
          -Dfrida-core:devkits=core

      - name: Compile
        run: make

      - name: Install
        run: DESTDIR="$FRIDA_PREFIX" make install

      - name: Strip debug symbols
        run: |
          find "$FRIDA_PREFIX" -type f | while read f; do
            if xcrun file "$f" 2>/dev/null | grep -qE "Mach-O|dylib"; then
              xcrun strip -Sx "$f" 2>/dev/null || true
            fi
          done

      - name: Install dpkg
        run: brew install dpkg xz

      - name: Package .deb
        run: |
          DEB_ARCH="iphoneos-arm64"
          [ "${{ matrix.arch }}" = "arm64e" ] && DEB_ARCH="iphoneos-arm64e"

          PKG_DIR="$RUNNER_WORKSPACE/pkg"
          mkdir -p "$PKG_DIR/DEBIAN"
          mkdir -p "$PKG_DIR/usr/bin"
          mkdir -p "$PKG_DIR/usr/lib/frida-1.0"

          cp "$FRIDA_PREFIX/usr/bin/frida-server" "$PKG_DIR/usr/bin/"
          cp -r "$FRIDA_PREFIX/usr/lib/frida-1.0/." "$PKG_DIR/usr/lib/frida-1.0/"

          printf 'Package: re.frida.server\nName: Frida Server\nVersion: %s\nArchitecture: %s\nDescription: Inject JavaScript to explore native apps on iOS\nMaintainer: validkanaheiuser\nSection: Development\nDepends: firmware (>= 16.0)\n' \
            "$FRIDA_VERSION" "$DEB_ARCH" > "$PKG_DIR/DEBIAN/control"

          printf '#!/bin/sh\nchmod 755 /usr/bin/frida-server\n' > "$PKG_DIR/DEBIAN/postinst"
          chmod 755 "$PKG_DIR/DEBIAN/postinst"

          dpkg-deb --root-owner-group -Zxz -z9 -b "$PKG_DIR" \
            "$RUNNER_WORKSPACE/frida-server_${FRIDA_VERSION}_${DEB_ARCH}.deb"

      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: deb-ios-${{ matrix.arch }}
          path: ${{ runner.workspace }}/frida-server_*.deb

      - name: Upload frida-server
        uses: actions/upload-artifact@v4
        with:
          name: frida-server-ios-${{ matrix.arch }}
          path: ${{ env.FRIDA_PREFIX }}/usr/bin/frida-server

      - name: Upload frida-gadget
        uses: actions/upload-artifact@v4
        with:
          name: frida-gadget-ios-${{ matrix.arch }}
          path: ${{ env.FRIDA_PREFIX }}/usr/lib/frida-1.0/frida-gadget.dylib

      - name: Upload frida-inject
        uses: actions/upload-artifact@v4
        with:
          name: frida-inject-ios-${{ matrix.arch }}
          path: ${{ env.FRIDA_PREFIX }}/usr/bin/frida-inject

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.release_tag != '')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Determine release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.release_tag }}" >> $GITHUB_OUTPUT
          else
            echo "value=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Download .deb artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: deb-ios-*
          merge-multiple: true
          path: release-files/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          name: "Frida iOS ${{ steps.tag.outputs.value }}"
          body: |
            Custom Frida iOS build — arm64 + arm64e

            **Thay đổi so với upstream:**
            - Control port: `31742`
            - Cluster port: `32519`
            - Default auth token được bật sẵn

            **Cài đặt:** sideload file `.deb` qua Filza, Sileo, hoặc Cydia.
          files: release-files/*.deb
          draft: false
          prerelease: false
